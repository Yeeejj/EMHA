<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="phase5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1050" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" filter="url(#glow)">INSIDE-OUT: Thesis Process Map</text>
  <text x="700" y="78" text-anchor="middle" fill="#a0a0cc" font-size="14">Emotion Recognition through Handwriting Analysis using CNN-HMM Hybrid Approach</text>
  <text x="700" y="96" text-anchor="middle" fill="#7070aa" font-size="12">Cyrel Jane A. Edaño — University of San Carlos, DCISM</text>

  <!-- ==================== ROW 1: Assessment & Collection ==================== -->

  <!-- Phase 1: Assessment Design -->
  <rect x="40" y="130" width="300" height="200" rx="16" fill="#1a1a3e" stroke="url(#phase1)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="130" width="300" height="36" rx="16" fill="url(#phase1)"/>
  <rect x="40" y="150" width="300" height="16" fill="url(#phase1)"/>
  <text x="190" y="155" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1. ASSESSMENT DESIGN</text>
  <text x="60" y="190" fill="#c0c0e0" font-size="12" font-weight="bold">3-Part Instrument:</text>
  <text x="60" y="212" fill="#a0a0cc" font-size="11">Part 1: 24-item Self-Report (Likert 1-5)</text>
  <text x="60" y="232" fill="#a0a0cc" font-size="11">Part 2: 4 Drawing Exercises</text>
  <text x="60" y="252" fill="#a0a0cc" font-size="11">Part 3: Writing Exercises</text>
  <text x="73" y="270" fill="#8080aa" font-size="10">• 5 words × 3 styles (L/R/UPPER)</text>
  <text x="73" y="286" fill="#8080aa" font-size="10">• 5 cursive sentences</text>
  <text x="60" y="310" fill="#667eea" font-size="10">Participants: 300+ | Ages 18-25 | Right-handed</text>

  <!-- Arrow 1→2 -->
  <path d="M 340 230 L 380 230" stroke="#667eea" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#667eea"/></marker></defs>

  <!-- Phase 2: Data Collection -->
  <rect x="390" y="130" width="280" height="200" rx="16" fill="#1a1a3e" stroke="url(#phase2)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="390" y="130" width="280" height="36" rx="16" fill="url(#phase2)"/>
  <rect x="390" y="150" width="280" height="16" fill="url(#phase2)"/>
  <text x="530" y="155" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2. DATA COLLECTION</text>
  <text x="410" y="190" fill="#c0c0e0" font-size="12" font-weight="bold">Participant Registration:</text>
  <text x="410" y="212" fill="#a0a0cc" font-size="11">• Barcode IDs (P001–P300+)</text>
  <text x="410" y="232" fill="#a0a0cc" font-size="11">• Consent + Demographics</text>
  <text x="410" y="258" fill="#c0c0e0" font-size="12" font-weight="bold">Scanning:</text>
  <text x="410" y="278" fill="#a0a0cc" font-size="11">• Handwriting → PNG images</text>
  <text x="410" y="298" fill="#a0a0cc" font-size="11">• Drawings → PNG images</text>
  <text x="410" y="318" fill="#f093fb" font-size="10">Output: DATA/RAW/participant_XXX/</text>

  <!-- Arrow 2→3 -->
  <path d="M 670 230 L 710 230" stroke="#f5576c" stroke-width="2" fill="none" marker-end="url(#arrowPink)"/>
  <defs><marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f5576c"/></marker></defs>

  <!-- Phase 3: Scoring & Labeling -->
  <rect x="720" y="130" width="300" height="200" rx="16" fill="#1a1a3e" stroke="url(#phase3)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="130" width="300" height="36" rx="16" fill="url(#phase3)"/>
  <rect x="720" y="150" width="300" height="16" fill="url(#phase3)"/>
  <text x="870" y="155" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3. SCORING &amp; LABELING</text>
  <text x="740" y="190" fill="#c0c0e0" font-size="12" font-weight="bold">Questionnaire Scoring:</text>
  <text x="740" y="212" fill="#a0a0cc" font-size="11">• DASS-21 (Depression 0-42)</text>
  <text x="740" y="232" fill="#a0a0cc" font-size="11">• Happiness Scale</text>
  <text x="740" y="258" fill="#c0c0e0" font-size="12" font-weight="bold">Labeling Thresholds:</text>
  <rect x="740" y="268" width="260" height="18" rx="4" fill="#1b4332" opacity="0.7"/>
  <text x="750" y="282" fill="#43e97b" font-size="11">HAPPY: happiness≥40 AND dass&lt;14</text>
  <rect x="740" y="290" width="260" height="18" rx="4" fill="#3b1a2b" opacity="0.7"/>
  <text x="750" y="304" fill="#f5576c" font-size="11">SAD: happiness&lt;30 OR dass≥14</text>
  <text x="740" y="324" fill="#4facfe" font-size="10">Output: DATA/LABELED/{HAPPY,SAD}/</text>

  <!-- Arrow 3→4 (down) -->
  <path d="M 870 330 L 870 370" stroke="#4facfe" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" orient="auto-start-reverse"><polygon points="0 0, 8 3, 0 6" fill="#4facfe"/></marker></defs>

  <!-- ==================== ROW 2: Preprocessing & CNN ==================== -->

  <!-- Phase 4: Image Preprocessing -->
  <rect x="720" y="380" width="300" height="200" rx="16" fill="#1a1a3e" stroke="url(#phase4)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="380" width="300" height="36" rx="16" fill="url(#phase4)"/>
  <rect x="720" y="400" width="300" height="16" fill="url(#phase4)"/>
  <text x="870" y="405" text-anchor="middle" fill="#1a1a3e" font-size="14" font-weight="bold">4. IMAGE PREPROCESSING</text>
  <text x="740" y="440" fill="#c0c0e0" font-size="12" font-weight="bold">Pipeline (5 steps):</text>
  <!-- Pipeline arrows -->
  <text x="740" y="462" fill="#43e97b" font-size="11">① Grayscale Conversion</text>
  <text x="740" y="482" fill="#43e97b" font-size="11">② Binarization (Otsu's method)</text>
  <text x="740" y="502" fill="#43e97b" font-size="11">③ Noise Removal (morphological)</text>
  <text x="740" y="522" fill="#43e97b" font-size="11">④ Skew Correction</text>
  <text x="740" y="542" fill="#43e97b" font-size="11">⑤ Normalize → 224×224</text>
  <text x="740" y="568" fill="#38f9d7" font-size="10">Output: DATA/PROCESSED/{HAPPY,SAD}/</text>

  <!-- Arrow 4→5 (left) -->
  <path d="M 720 480 L 680 480" stroke="#38f9d7" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><polygon points="0 0, 8 3, 0 6" fill="#38f9d7"/></marker></defs>

  <!-- Phase 5: CNN Feature Extraction -->
  <rect x="340" y="380" width="330" height="200" rx="16" fill="#1a1a3e" stroke="url(#phase5)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="340" y="380" width="330" height="36" rx="16" fill="url(#phase5)"/>
  <rect x="340" y="400" width="330" height="16" fill="url(#phase5)"/>
  <text x="505" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5. CNN FEATURE EXTRACTION</text>
  <text x="360" y="440" fill="#c0c0e0" font-size="12" font-weight="bold">Architecture (4 Conv Blocks):</text>
  <text x="360" y="462" fill="#a0a0cc" font-size="11">Conv2d(1→32) + BN + ReLU + MaxPool</text>
  <text x="360" y="482" fill="#a0a0cc" font-size="11">Conv2d(32→64) + BN + ReLU + MaxPool</text>
  <text x="360" y="502" fill="#a0a0cc" font-size="11">Conv2d(64→128) + BN + ReLU + MaxPool</text>
  <text x="360" y="522" fill="#a0a0cc" font-size="11">Conv2d(128→256) + BN + ReLU</text>
  <text x="360" y="548" fill="#c0c0e0" font-size="12" font-weight="bold">Spatial Sequence Output:</text>
  <text x="360" y="568" fill="#fee140" font-size="10">Height-avg → (batch, 28, 256) L-to-R sequence</text>

  <!-- Arrow 5→6 (left) -->
  <path d="M 340 480 L 300 480" stroke="#fee140" stroke-width="2" fill="none" marker-end="url(#arrowYellow)"/>
  <defs><marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><polygon points="0 0, 8 3, 0 6" fill="#fee140"/></marker></defs>

  <!-- Phase 6: HMM Classification -->
  <rect x="40" y="380" width="250" height="200" rx="16" fill="#1a1a3e" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="380" width="250" height="36" rx="16" fill="#ff6b6b"/>
  <rect x="40" y="400" width="250" height="16" fill="#ff6b6b"/>
  <text x="165" y="405" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">6. HMM CLASSIFICATION</text>
  <text x="60" y="440" fill="#c0c0e0" font-size="12" font-weight="bold">Per-Class HMMs:</text>
  <rect x="60" y="452" width="210" height="22" rx="6" fill="#1b4332" opacity="0.7"/>
  <text x="70" y="468" fill="#43e97b" font-size="11">HMM_HAPPY (4 states, diag)</text>
  <rect x="60" y="478" width="210" height="22" rx="6" fill="#3b1a2b" opacity="0.7"/>
  <text x="70" y="494" fill="#f5576c" font-size="11">HMM_SAD (4 states, diag)</text>
  <text x="60" y="524" fill="#c0c0e0" font-size="12" font-weight="bold">Classification:</text>
  <text x="60" y="544" fill="#a0a0cc" font-size="11">Compare log-likelihoods</text>
  <text x="60" y="564" fill="#a0a0cc" font-size="11">Softmax → confidence score</text>

  <!-- Arrow 6→7 (down) -->
  <path d="M 165 580 L 165 630" stroke="#ff6b6b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/></marker></defs>

  <!-- ==================== ROW 3: Validation & Results ==================== -->

  <!-- Phase 7: Cross-Validation -->
  <rect x="40" y="640" width="300" height="180" rx="16" fill="#1a1a3e" stroke="#ffd93d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="640" width="300" height="36" rx="16" fill="#ffd93d"/>
  <rect x="40" y="660" width="300" height="16" fill="#ffd93d"/>
  <text x="190" y="665" text-anchor="middle" fill="#1a1a3e" font-size="14" font-weight="bold">7. CROSS-VALIDATION</text>
  <text x="60" y="700" fill="#c0c0e0" font-size="12" font-weight="bold">Stratified 5-Fold CV:</text>
  <text x="60" y="722" fill="#a0a0cc" font-size="11">Each fold:</text>
  <text x="73" y="742" fill="#ffd93d" font-size="11">① Train CNN (early stopping)</text>
  <text x="73" y="762" fill="#ffd93d" font-size="11">② Extract sequence features</text>
  <text x="73" y="782" fill="#ffd93d" font-size="11">③ Train HMM on features</text>
  <text x="73" y="802" fill="#ffd93d" font-size="11">④ Evaluate predictions</text>

  <!-- Arrow 7→8 -->
  <path d="M 340 730 L 390 730" stroke="#ffd93d" stroke-width="2" fill="none" marker-end="url(#arrowGold)"/>
  <defs><marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffd93d"/></marker></defs>

  <!-- Phase 8: Evaluation -->
  <rect x="400" y="640" width="280" height="180" rx="16" fill="#1a1a3e" stroke="#6bcb77" stroke-width="2" filter="url(#shadow)"/>
  <rect x="400" y="640" width="280" height="36" rx="16" fill="#6bcb77"/>
  <rect x="400" y="660" width="280" height="16" fill="#6bcb77"/>
  <text x="540" y="665" text-anchor="middle" fill="#1a1a3e" font-size="14" font-weight="bold">8. EVALUATION</text>
  <text x="420" y="700" fill="#c0c0e0" font-size="12" font-weight="bold">Metrics:</text>
  <text x="420" y="722" fill="#a0a0cc" font-size="11">• Accuracy (target: 80-85%)</text>
  <text x="420" y="742" fill="#a0a0cc" font-size="11">• Precision (macro-averaged)</text>
  <text x="420" y="762" fill="#a0a0cc" font-size="11">• Recall (macro-averaged)</text>
  <text x="420" y="782" fill="#a0a0cc" font-size="11">• F1-Score (macro-averaged)</text>
  <text x="420" y="802" fill="#a0a0cc" font-size="11">• Confusion Matrix</text>

  <!-- Arrow 8→9 -->
  <path d="M 680 730 L 720 730" stroke="#6bcb77" stroke-width="2" fill="none" marker-end="url(#arrowLGreen)"/>
  <defs><marker id="arrowLGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6bcb77"/></marker></defs>

  <!-- Phase 9: Final Model -->
  <rect x="730" y="640" width="290" height="180" rx="16" fill="#1a1a3e" stroke="#4d96ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="730" y="640" width="290" height="36" rx="16" fill="#4d96ff"/>
  <rect x="730" y="660" width="290" height="16" fill="#4d96ff"/>
  <text x="875" y="665" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">9. FINAL MODEL</text>
  <text x="750" y="700" fill="#c0c0e0" font-size="12" font-weight="bold">Saved Artifacts:</text>
  <text x="750" y="722" fill="#a0a0cc" font-size="11">• cnn_model.pth (CNN weights)</text>
  <text x="750" y="742" fill="#a0a0cc" font-size="11">• hmm_models.pkl (HMM params)</text>
  <text x="750" y="762" fill="#a0a0cc" font-size="11">• cv_results.json (metrics)</text>
  <text x="750" y="790" fill="#c0c0e0" font-size="12" font-weight="bold">Prediction Pipeline:</text>
  <text x="750" y="810" fill="#4d96ff" font-size="10">Image → Preprocess → CNN → HMM → HAPPY/SAD</text>

  <!-- ==================== SIDE: Tech Stack ==================== -->
  <rect x="1060" y="130" width="300" height="690" rx="16" fill="#1a1a3e" stroke="#555588" stroke-width="1" filter="url(#shadow)"/>
  <rect x="1060" y="130" width="300" height="36" rx="16" fill="#555588"/>
  <rect x="1060" y="150" width="300" height="16" fill="#555588"/>
  <text x="1210" y="155" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">TECH STACK &amp; TOOLS</text>

  <text x="1080" y="195" fill="#667eea" font-size="13" font-weight="bold">Deep Learning</text>
  <text x="1080" y="215" fill="#a0a0cc" font-size="11">PyTorch (CNN, DataLoader)</text>
  <text x="1080" y="235" fill="#a0a0cc" font-size="11">torchvision (transforms)</text>

  <text x="1080" y="270" fill="#f093fb" font-size="13" font-weight="bold">Sequence Modeling</text>
  <text x="1080" y="290" fill="#a0a0cc" font-size="11">hmmlearn (GaussianHMM)</text>

  <text x="1080" y="325" fill="#43e97b" font-size="13" font-weight="bold">Image Processing</text>
  <text x="1080" y="345" fill="#a0a0cc" font-size="11">OpenCV (cv2)</text>
  <text x="1080" y="365" fill="#a0a0cc" font-size="11">Pillow (PIL)</text>

  <text x="1080" y="400" fill="#4facfe" font-size="13" font-weight="bold">ML &amp; Evaluation</text>
  <text x="1080" y="420" fill="#a0a0cc" font-size="11">scikit-learn (metrics, CV)</text>

  <text x="1080" y="455" fill="#fee140" font-size="13" font-weight="bold">Data &amp; Visualization</text>
  <text x="1080" y="475" fill="#a0a0cc" font-size="11">pandas, numpy</text>
  <text x="1080" y="495" fill="#a0a0cc" font-size="11">matplotlib, seaborn</text>

  <text x="1080" y="530" fill="#ff6b6b" font-size="13" font-weight="bold">Platform</text>
  <text x="1080" y="550" fill="#a0a0cc" font-size="11">Google Colab (GPU)</text>
  <text x="1080" y="570" fill="#a0a0cc" font-size="11">Google Drive (storage)</text>

  <text x="1080" y="605" fill="#6bcb77" font-size="13" font-weight="bold">Psychometric Instruments</text>
  <text x="1080" y="625" fill="#a0a0cc" font-size="11">DASS-21 (Depression scale)</text>
  <text x="1080" y="645" fill="#a0a0cc" font-size="11">Oxford/SDHS (Happiness)</text>

  <text x="1080" y="680" fill="#4d96ff" font-size="13" font-weight="bold">Key Parameters</text>
  <text x="1080" y="700" fill="#a0a0cc" font-size="11">Image: 224×224 grayscale</text>
  <text x="1080" y="720" fill="#a0a0cc" font-size="11">CNN: 256-dim features</text>
  <text x="1080" y="740" fill="#a0a0cc" font-size="11">HMM: 4 states, diag covariance</text>
  <text x="1080" y="760" fill="#a0a0cc" font-size="11">Training: batch=32, lr=0.001</text>
  <text x="1080" y="780" fill="#a0a0cc" font-size="11">Early stopping: patience=10</text>
  <text x="1080" y="800" fill="#a0a0cc" font-size="11">Validation: 5-fold stratified CV</text>

  <!-- ==================== BOTTOM: Data Flow Summary ==================== -->
  <rect x="40" y="860" width="980" height="70" rx="12" fill="#1a1a3e" stroke="#555588" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="885" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">END-TO-END DATA FLOW</text>

  <text x="60" y="912" fill="#667eea" font-size="12">Assessment</text>
  <text x="145" y="912" fill="#555588" font-size="12">→</text>
  <text x="165" y="912" fill="#f093fb" font-size="12">Scan</text>
  <text x="205" y="912" fill="#555588" font-size="12">→</text>
  <text x="225" y="912" fill="#4facfe" font-size="12">Score</text>
  <text x="275" y="912" fill="#555588" font-size="12">→</text>
  <text x="295" y="912" fill="#4facfe" font-size="12">Label</text>
  <text x="340" y="912" fill="#555588" font-size="12">→</text>
  <text x="360" y="912" fill="#43e97b" font-size="12">Preprocess</text>
  <text x="450" y="912" fill="#555588" font-size="12">→</text>
  <text x="470" y="912" fill="#fee140" font-size="12">CNN Features</text>
  <text x="575" y="912" fill="#555588" font-size="12">→</text>
  <text x="595" y="912" fill="#ff6b6b" font-size="12">HMM Classify</text>
  <text x="705" y="912" fill="#555588" font-size="12">→</text>
  <text x="725" y="912" fill="#ffd93d" font-size="12">5-Fold CV</text>
  <text x="810" y="912" fill="#555588" font-size="12">→</text>
  <text x="830" y="912" fill="#6bcb77" font-size="12">Evaluate</text>
  <text x="910" y="912" fill="#555588" font-size="12">→</text>
  <text x="935" y="912" fill="#4d96ff" font-size="12">HAPPY / SAD</text>

  <!-- Footer -->
  <text x="700" y="1000" text-anchor="middle" fill="#555588" font-size="11">INSIDE-OUT Thesis Process Map — CNN-HMM Hybrid Emotion Recognition from Handwriting</text>
  <text x="700" y="1020" text-anchor="middle" fill="#444466" font-size="10">University of San Carlos, DCISM — May 2025</text>
</svg>
