[flake8]
# Align flake8 with black's formatting (black uses an 88-char line length).
max-line-length = 88
# E203 (whitespace before ':') and W503 (line break before binary operator)
# conflict with black's style; the black project recommends ignoring both.
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    DATA,
    DATASET,
    BACKUP,
    notebooks
